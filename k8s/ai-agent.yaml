apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  namespace: megamart-store-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent
  template:
    metadata:
      labels:
        app: ai-agent
      annotations:
        # AUTOMATION: Tell Istio to fetch identity from the SPIRE socket
        sidecar.istio.io/userVolume: '[{"name":"spire-socket", "hostPath":{"path":"/run/spire/edge-sockets"}}]'
        sidecar.istio.io/userVolumeMount: '[{"name":"spire-socket", "mountPath":"/var/run/secrets/workload-spiffe-uds", "readOnly":true}]'
    spec:
      containers:
      - name: ai-agent
        image: ai-agent-backend:latest
        imagePullPolicy: Never # Adjust if using a registry
        ports:
        - containerPort: 8000
        env:
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///run/spire/sockets/spire-agent.sock"
        volumeMounts:
        - name: spire-agent-socket
          mountPath: /run/spire/sockets
          readOnly: true
      volumes:
      - name: spire-agent-socket
        hostPath:
          path: /run/spire/edge-sockets
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent
  namespace: megamart-store-apps
spec:
  type: NodePort
  selector:
    app: ai-agent
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30001
