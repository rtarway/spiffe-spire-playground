apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-frontend
  namespace: megamart-store-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp-frontend
  template:
    metadata:
      labels:
        app: webapp-frontend
      annotations:
        # AUTOMATION: Tell Istio to fetch identity from the SPIRE socket
        sidecar.istio.io/userVolume: '[{"name":"spire-socket", "hostPath":{"path":"/run/spire/edge-sockets"}}]'
        sidecar.istio.io/userVolumeMount: '[{"name":"spire-socket", "mountPath":"/var/run/secrets/workload-spiffe-uds", "readOnly":true}]'
    spec:
      containers:
      - name: webapp-frontend
        image: webapp-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-frontend
  namespace: megamart-store-apps
spec:
  type: NodePort
  selector:
    app: webapp-frontend
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30000
