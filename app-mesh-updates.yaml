# 1. Enforce STRICT mTLS for all Edge components
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: megamart-store-apps
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: megamart-store-edge
spec:
  mtls:
    mode: STRICT
---
# 2. Delegate Authorization for the MCP Server to OPA
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: mcp-server-opa
  namespace: megamart-store-apps
spec:
  selector:
    matchLabels:
      app: mcp-server
  action: CUSTOM
  provider:
    name: "opa-ext-authz"
  rules:
  - to:
    - operation:
        methods: ["POST"]
        paths: ["/mcp/messages"]
