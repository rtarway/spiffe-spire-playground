apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: megamart-store-edge
  labels:
    app: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
      - name: opa
        image: openpolicyagent/opa:latest
        args:
        - "run"
        - "--server"
        - "--addr=0.0.0.0:9191"
        - "/policy/policy.rego"
        ports:
        - name: http
          containerPort: 9191
        volumeMounts:
        - name: opa-policy
          mountPath: /policy
          readOnly: true
      volumes:
      - name: opa-policy
        configMap:
          name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: megamart-store-edge
spec:
  ports:
  - name: http
    port: 9191
    targetPort: 9191
  selector:
    app: opa
